
services:
  backend:
    build: ./Backend
    container_name: Shell_Backend
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_URL: ${VITE_BASE_URL}
        VITE_RAZORPAY_KEY: ${VITE_RAZORPAY_KEY}
    container_name: Shell_Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
